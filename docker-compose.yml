networks:
  fl-net:
    driver: bridge

x-client-base: &client-base
  build: .
  networks:
    - fl-net
  depends_on:
    - server
  restart: "no"

services:
  server:
    build: .
    networks:
      - fl-net
    ports:
      - "8002:8002"
      - "8003:8003"
    volumes:
      - ./workspace/fraud_fl/prod_00/server:/workspace/server
      - ./jobs/fraud_fl:/workspace/server/transfer/fraud_fl
    command: >
      python3 -u -m nvflare.private.fed.app.server.server_train
      -m /workspace/server
      -s fed_server.json
      --set secure_train=true org=openclaw config_folder=config

  bank_a:
    <<: *client-base
    volumes:
      - ./workspace/fraud_fl/prod_00/site-1:/workspace/site-1
      - ./data/partitioned:/workspace/data/partitioned:ro
      - ./config.py:/workspace/config.py:ro
      - ./utils:/workspace/utils:ro
    command: >
      python3 -u -m nvflare.private.fed.app.client.client_train
      -m /workspace/site-1
      -s fed_client.json
      --set secure_train=true uid=site-1 org=bank_a config_folder=config

  bank_b:
    <<: *client-base
    volumes:
      - ./workspace/fraud_fl/prod_00/site-2:/workspace/site-2
      - ./data/partitioned:/workspace/data/partitioned:ro
      - ./config.py:/workspace/config.py:ro
      - ./utils:/workspace/utils:ro
    command: >
      python3 -u -m nvflare.private.fed.app.client.client_train
      -m /workspace/site-2
      -s fed_client.json
      --set secure_train=true uid=site-2 org=bank_b config_folder=config

  bank_c:
    <<: *client-base
    volumes:
      - ./workspace/fraud_fl/prod_00/site-3:/workspace/site-3
      - ./data/partitioned:/workspace/data/partitioned:ro
      - ./config.py:/workspace/config.py:ro
      - ./utils:/workspace/utils:ro
    command: >
      python3 -u -m nvflare.private.fed.app.client.client_train
      -m /workspace/site-3
      -s fed_client.json
      --set secure_train=true uid=site-3 org=bank_c config_folder=config
